name: Deploy CLIENT — test-development

on:
  push:
    branches:
      - test-development

jobs:
  deploy:
    name: Deploy to server (test)
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_TEST }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no webuser@${{ secrets.HOST }} '/home/webuser/deploy_client_test.sh'
